<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Comfortaa', sans-serif;
        padding-top: 90px; /* shift everything down for dashboard */
    }

    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap');

    /* TOP DASHBOARD BAR */
    #topbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: rgba(20, 20, 20, 0.95);
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        z-index: 99999;
        border-bottom: 2px solid #444;
    }

    .topbar-item {
        color: white;
        font-size: 24px;
        font-weight: 600;
        cursor: default;
        user-select: none;
        opacity: 0.9;
    }

    .topbar-item:hover {
        opacity: 1;
    }

    /* Snow Canvas */
    #snowCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
    }

    /* Menu Buttons */
    #menu {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -40%);
        z-index: 2;
        text-align: center;
    }

    .menu-btn {
        width: 360px; /* thinner */
        padding: 18px;
        margin: 28px 0; /* more vertical spacing */
        background: rgba(85, 85, 85, 0.75);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 26px;
        cursor: pointer;
        transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        font-family: 'Comfortaa', sans-serif;
    }

    .menu-btn:hover {
        background: rgba(50, 120, 255, 0.85);
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(50, 120, 255, 0.75);
    }

    /* Iframe Container */
    #frameContainer {
        width: 100vw;
        height: 100vh;
        display: none;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<!-- DASHBOARD BAR -->
<div id="topbar">
    <div class="topbar-item">Home</div>
    <div class="topbar-item">Games</div>
    <div class="topbar-item">Coming Soon</div>
</div>

<canvas id="snowCanvas"></canvas>

<div id="menu">
    <button class="menu-btn" onclick="loadSite('https://skip.nightly.pw/')">Skip</button>
    <button class="menu-btn" onclick="loadSite('https://gnmath.global.ssl.fastly.net/')">GN-Math</button>
    <button class="menu-btn" onclick="loadSilksong()">Game of The Week</button>
</div>

<div id="frameContainer">
    <iframe id="mainFrame"></iframe>
</div>

<script>
/* Snow Animation */
const canvas = document.getElementById("snowCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let snowflakes = [];
let snowActive = true;

for (let i = 0; i < 120; i++) {
    snowflakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        speed: Math.random() * 0.5 + 0.2
    });
}

function drawSnow() {
    if (!snowActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    snowflakes.forEach(flake => {
        ctx.beginPath();
        ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
        ctx.fill();

        flake.y += flake.speed;
        if (flake.y > canvas.height) flake.y = -5;
    });

    requestAnimationFrame(drawSnow);
}

drawSnow();

/* Load iframe site */
function loadSite(url) {
    hideMenu();
    document.getElementById("frameContainer").style.display = "block";
    document.getElementById("mainFrame").src = url;
}

/* Load Silksong Game */
function loadSilksong() {
    hideMenu();
    document.getElementById("frameContainer").style.display = "block";
    document.getElementById("mainFrame").src = "Hollow Knight_Silksong.html";
}

/* Hide menu + snow */
function hideMenu() {
    document.getElementById("menu").style.display = "none";

    snowActive = false;
    document.getElementById("snowCanvas").style.display = "none";
}
</script>

</body>
</html>
